env:
  env_name: Craftax-Classic-Pixels-v1
  seed: 7
map:
  generator:
    name: box
    config:
      inner_size: 5
      perimeter_tree_prob: 0.6
      blocked_block: out_of_bounds
      floor_block: grass
      perimeter_block: tree
systems:
  static_env:
    map_size: 64
  spawn:
    disable_mob_spawns: true
  movement:
    behaviors:
      - solid_blocks
    rules:
      solid_out_of_bounds:
        value: true
        probability: 1.0
  reset:
    behaviors:
      - starting_inventory
      - starting_intrinsics
    starting_inventory:
      wood:
        value: 3
        probability: 0.1
      sapling:
        value: 2
        probability: 1.0
    starting_intrinsics:
      player_health:
        value: 9
        probability: 1.0
      player_food:
        value: 9
        probability: 1.0
      player_drink:
        value: 9
        probability: 1.0
      player_energy:
        value: 9
        probability: 1.0
      player_fatigue:
        value: 0.0
        probability: 1.0
  step:
    behaviors:
      - intrinsic_dynamics
      - action_energy_drain
      - instant_recovery
    intrinsic_rates:
      player_hunger_rate:
        value: 1.0
        probability: 1.0
      player_thirst_rate:
        value: 1.0
        probability: 1.0
      player_fatigue_rate:
        value: 0.0
        probability: 1.0
      player_fatigue_sleep_rate:
        value: 0.0
        probability: 1.0
    intrinsic_thresholds:
      player_hunger_threshold:
        value: 5.0
        probability: 1.0
      player_thirst_threshold:
        value: 10.0
        probability: 1.0
      player_fatigue_threshold:
        value: 999.0
        probability: 1.0
      player_fatigue_recover_threshold:
        value: -999.0
        probability: 1.0
    rules:
      instant_sleep_recovery:
        value: true
        probability: 1.0
      sleep_energy_value:
        value: 9
        probability: 1.0
      sleep_fatigue_value:
        value: 0.0
        probability: 1.0
      wake_after_sleep_recovery:
        value: true
        probability: 1.0
      action_energy_cost:
        value: 1
        probability: 1.0
