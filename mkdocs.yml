site_name: Tunix CrafText
site_description: JAX-native CrafText training stack
repo_name: local/tunix-craftext
theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - content.code.copy
extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid.js
  - https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js
  - javascripts/task-graph.js
extra_css:
  - stylesheets/kanban.css
plugins:
  - search
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Dashboard: _generated/dashboard.md
  - Kanban: _generated/kanban.md
  - Граф задач: _generated/task-graph.md
  - Обзор: index.md
  - Архитектура: architecture.md
  - Совместимость моделей: interop.md
  - Контрольные точки: checkpoints.md
  - Интеграция с Tunix: tunix.md
  - Аудит training stack: training-stack-audit.md
  - Внешний PPO/hybrid аудит: report_audit.md
  - Аудит unit-тестов: unit-test-audit.md
  - CLI слой: cli.md
  - Промпты: prompts.md
  - Конфигурация: configuration.md
  - Код:
      - Обзор API: code-reference.md
      - Автодока API: _generated/api-reference.md
      - Типы и docstrings: code-quality.md
  - Патчи vendor: vendor-patches.md
  - План реализации: plan.md
  - Качество и perf: quality.md
  - Профилирование: profiling.md
  - Observability: observability.md
  - Среда разработки: development.md
  - Поставка изменений: delivery.md
  - Эксперименты: experiments.md
  - Примеры: examples.md
  - История изменений: _generated/changelog.md
  - Бенчмарки: _generated/benchmarks.md
  - ADR:
      - Границы системы: adr/0001-system-boundaries.md
      - Первая Tunix-модель: adr/0002-first-tunix-model.md
      - Extension и observability: adr/0003-extension-and-observability-contracts.md
      - Tunix topology: adr/0004-tunix-cluster-topology.md
      - Sync-first training stack: adr/0005-sync-first-training-stack.md
