schema_version: 1
engine:
  name: qwen25-05b-vllm-async
  backend: vllm-offload
  model: artifacts/models/qwen25-05b-instruct
  tensor_parallel_size: 1
  max_model_len: 2048
  dtype: bfloat16
  mode: async
  policy_version: 0
  metadata:
    attention_backend: auto
    kernel_stack: auto
    multiprocessing_method: spawn
    role: rollout
tunix:
  engine: vllm
  max_prompt_length: 1024
  max_tokens_to_generate: 32
  temperature: 1.0
  kv_cache_size: 2048
  return_logprobs: true
  tensor_parallel_size: 1
  data_parallel_size: -1
  expert_parallel_size: 1
  vllm_server_mode: true
  vllm_async_scheduling: true
  vllm_hbm_utilization: 0.35
  vllm_model_version: qwen2.5-0.5b
  vllm_init_with_random_weights: false
  vllm_max_num_batched_tokens: 4096
  vllm_max_num_seqs: 32
  vllm_kwargs: {}
  vllm_sampling_kwargs: {}
async:
  max_in_flight: 2
  queue_maxsize: 16
  submission_timeout_s: 0.02
