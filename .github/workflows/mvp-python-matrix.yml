name: MVP Python compatibility

# Keep this expensive matrix dormant during foundation work. Cut an mvp-v* tag when the
# environment/algorithm MVP is ready, or use workflow_dispatch to validate a release candidate.
on:
  push:
    tags:
      - "mvp-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,docs]'
      - run: make test
      - run: make integration
