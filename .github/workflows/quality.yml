name: CPU quality gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run ruff check src tests scripts
      - run: uv run mypy src/tunix_craftext
      - run: uv run pytest tests/unit --cov=src/tunix_craftext --cov-report=term-missing:skip-covered --cov-report=xml --cov-fail-under=82
